  # =============================================================================
#  docker-compose.yml — Orchestration de tous les services du projet MLOps
# =============================================================================

services:

  # ===========================================================================
  # MLflow Tracking Server
  # ===========================================================================
  mlflow:
    build:
      context: ./docker/mlflow
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:8080
      - MLFLOW_SERVER_ALLOWED_HOSTS=mlflow,127.0.0.1,localhost
      - MLFLOW_SERVER_HOST=0.0.0.0
      - MLFLOW_SERVER_PORT=8080




    volumes:
      - mlflow-data:/mlflow/data
    command: >
      mlflow server
      --host 0.0.0.0
      --port 8080
      --backend-store-uri sqlite:////mlflow/data/mlflow.db
      --artifacts-destination /mlflow/data/mlruns
      --serve-artifacts
      --allowed-hosts mlflow,mlflow:8080,localhost,127.0.0.1,0.0.0.0

    networks:
      - mlops-net
    restart: unless-stopped


  # ===========================================================================
  # API FastAPI — service d'inférence
  # ===========================================================================
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:8080
    depends_on:
      - mlflow
    networks:
      - mlops-net
    restart: unless-stopped


  # ===========================================================================
  # Airflow (mode standalone)
  # ===========================================================================
  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    command: airflow standalone
    ports:
      - "${AIRFLOW_HOST_PORT:-8082}:8080"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:8080
      PYTHONPATH: /opt/airflow
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
      - ./src:/opt/airflow/src
    depends_on:
      - mlflow
    networks:
      - mlops-net
    restart: unless-stopped


# =============================================================================
#  Volumes nommés
# =============================================================================
volumes:
  mlflow-data:


# =============================================================================
#  Réseau interne du projet
# =============================================================================
networks:
  mlops-net:
    driver: bridge
