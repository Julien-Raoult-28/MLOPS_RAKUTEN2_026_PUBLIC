  # =============================================================================
#  docker-compose.yml — Orchestration de tous les services du projet MLOps
# =============================================================================

services:

  # ===========================================================================
  # MLflow Tracking Server
  # ===========================================================================
  mlflow:
    build:
      context: ./docker/mlflow
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:8080
      - MLFLOW_SERVER_ALLOWED_HOSTS=mlflow,127.0.0.1,localhost,localhost:8081,127.0.0.1:8081
      - MLFLOW_SERVER_HOST=0.0.0.0
      - MLFLOW_SERVER_PORT=8080




    volumes:
      - mlflow-data:/mlflow/data
    command: >
      mlflow server
      --host 0.0.0.0
      --port 8080
      --backend-store-uri sqlite:////mlflow/data/mlflow.db
      --artifacts-destination /mlflow/data/mlruns
      --serve-artifacts
      --allowed-hosts mlflow,mlflow:8080,localhost,127.0.0.1,0.0.0.0,localhost:8081,127.0.0.1:8081

    networks:
      - mlops-net
    restart: unless-stopped
    # Limites ressources (laptop 4 CPU) : empeche un service de monopoliser la machine
    deploy:
      resources:
        limits:
          cpus: '1.0'
          # Recoit l'upload de l'artefact modele (model.pkl + vocab TF-IDF) depuis
          # le DAG. 1G -> OOM (connection reset peer) pendant log_model. 2G OK.
          # Ajustable par membre via .env (MLFLOW_MEM). Defaut = valeur testee.
          memory: ${MLFLOW_MEM:-2G}


  # ===========================================================================
  # API FastAPI — service d'inférence
  # ===========================================================================
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:8080
    depends_on:
      - mlflow
    networks:
      - mlops-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          # Inference seule (modele garde en cache memoire). ~150 Mo en pratique.
          # Ajustable par membre via .env (API_MEM). Defaut = valeur testee.
          memory: ${API_MEM:-1G}


  # ===========================================================================
  # Airflow (mode standalone)
  # ATTENTION : Airflow est lourd (~1-2 Go RAM). Sur ce projet il sert surtout
  # a la DEMONSTRATION de l'orchestration. Pour un simple entrainement local,
  # preferer `python src/models/train.py` (bien plus leger que le DAG).
  # ===========================================================================
  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    command: airflow standalone
    ports:
      - "${AIRFLOW_HOST_PORT:-8082}:8080"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:8080
      PYTHONPATH: /opt/airflow
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
      - ./src:/opt/airflow/src
    depends_on:
      - mlflow
    networks:
      - mlops-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          # Entrainement (TF-IDF + LinearSVC sur tout le dataset) : pic memoire.
          # 2G -> OOM-kill (SIGKILL) de la tache train. 4G testes OK.
          # Ajustable par membre via .env (AIRFLOW_MEM). Defaut = valeur testee.
          memory: ${AIRFLOW_MEM:-4G}


# =============================================================================
#  Volumes nommés
# =============================================================================
volumes:
  mlflow-data:


# =============================================================================
#  Réseau interne du projet
# =============================================================================
networks:
  mlops-net:
    driver: bridge
